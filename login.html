<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acessar Conta - Sonora Educação Musical</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Header -->
    <header id="site-header" class="header glass">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html"><img src="img/logo.png" alt="Sonora Logo" /></a>
            </div>
            <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
                <span class="hamburger-bar"></span>
                <span class="hamburger-bar"></span>
                <span class="hamburger-bar"></span>
            </button>
            <nav class="nav-menu">
                <ul>
                    <li><a href="sobre.html">Sobre Nós</a></li>
                    <li><a href="cursos.html">Cursos</a></li>
                    <li><a href="professores.html">Professores</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
                <div class="cta-mobile">
                    <a href="https://api.whatsapp.com/message/GBODBOK3OAPBL1?autoload=1&app_absent=0&utm_source=ig" class="button enroll-btn" target="_blank" rel="noopener">Matricule‑se</a>
                </div>
            </nav>
            <div class="cta">
                <a href="https://api.whatsapp.com/message/GBODBOK3OAPBL1?autoload=1&app_absent=0&utm_source=ig" class="button enroll-btn" target="_blank" rel="noopener">Matricule‑se</a>
            </div>
        </div>
    </header>

    <!-- Subpage Hero -->
    <section class="subpage-hero">
        <div class="container">
            <h1>Acesso Administrativo</h1>
            <p class="subtitle">Faça login com suas credenciais para gerenciar o painel.</p>
        </div>
    </section>

    <!-- Login Area -->
    <section class="section">
        <div class="container" style="max-width: 450px;">
            <!-- Login Form -->
            <div id="login-form-container" class="contact-form-container">
                <form id="login-form" class="styled-form">
                    <div class="form-group">
                        <label for="login-username">Usuário</label>
                        <input type="text" id="login-username" placeholder="Seu nome de usuário" required />
                    </div>
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="Sua senha" required />
                    </div>
                    <button type="submit" class="button form-submit-btn" style="width: 100%; margin-top: 1rem;">Entrar no Painel</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer section">
        <div class="container footer-content">
            <p>Endereço: R. Henrique Beletable, 46 - Santo Antônio, Colatina - ES, 29704-065</p>
            <p>Instagram: <a href="https://instagram.com/sonorae.m" target="_blank" rel="noopener">@sonorae.m</a></p>
            <p>&copy; 2026 Sonora Educação Musical</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Authentication logic
        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            fetch('auth.php?action=login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('sonoraCurrentUser', JSON.stringify(data.user));
                    alert(`Bem-vindo, ${data.user.name}!`);
                    if (data.user.role === 'adm') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert(data.message || 'Usuário ou senha incorretos.');
                }
            })
            .catch(err => {
                console.error(err);
                alert('Erro ao processar login no servidor. Verifique se o XAMPP está rodando e acesse via http://localhost/...');
            });
        });
    </script>
</body>
</html>
